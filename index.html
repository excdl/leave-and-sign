<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請假簽核系統</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f8; margin:0; padding:0; }
  button, tr { cursor: pointer; }

  #loginBox { display:flex; flex-direction:column; max-width:400px; margin:80px auto; background:#fff; padding:30px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.1);}
  #loginBox h2 { margin:0 0 20px 0; text-align:center; }
  
  /* 密碼遮蔽效果 */
  #loginCode { 
    padding:14px; margin:8px 0; font-size:1em; border-radius:8px; border:1px solid #ccc; width:100%; box-sizing:border-box; 
    -webkit-text-security: disc;
  }
  
  #loginBox button { padding:14px; margin-top:12px; font-size:1em; border:none; border-radius:8px; background:#1976d2; color:#fff; font-weight:bold; }
  
  #mainCard { display:none; padding:15px; max-width: 800px; margin: 0 auto; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px; }
  .closeBtn-round { width:40px; height:40px; border-radius:50%; border:none; background:#d32f2f; color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; }
  
  /* 篩選器按鈕區塊 */
  .filters { 
    display:flex; overflow-x:auto; gap:10px; margin-bottom:15px; padding-bottom:5px;
  }
  
  .filters button { 
    padding: 12px 24px;       /* 增加一點點內距，讓放大後的文字有空間 */
    border: none; 
    border-radius: 25px; 
    font-weight: bold; 
    background: #e0e0e0; 
    white-space: nowrap;
    
    /* === 文字放大 20% === */
    font-size: 1.2em;         /* 將原本的 1em 放大至 1.5em */
  }
  
  .filters button.active { background:#1976d2; color:#fff; }
  
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; }
  th { background:#1976d2; color:#fff; padding:12px; }
  td { padding:12px; border-bottom:1px solid #eee; text-align:center; }
  tr:hover { background: #f0f7ff; }

  .badge { padding:4px 10px; border-radius:12px; font-size:0.85em; font-weight:bold; }
  .badge-未簽核 { background:#ffebee; color:#d32f2f; }
  .badge-簽核中 { background:#fff3e0; color:#f57c00; }
  .badge-已簽核 { background:#e8f5e9; color:#388e3c; }

  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; }
  #modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:30px; border-radius:16px; width:90%; max-width:450px; z-index:1000; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
  
  .modal-close { position:absolute; top:15px; right:15px; width:32px; height:32px; border-radius:50%; border:none; background:#f5f5f5; font-size:18px; }
  .modal-item { margin:18px 0; }
  .modal-label { color:#888; font-size:0.85rem; }
  .modal-val { font-weight:600; font-size:1.15rem; color:#333; margin-top:4px; }

  .btn-action { flex:1; padding:14px; border:none; border-radius:8px; font-weight:600; transition:transform 0.1s; }
  .btn-action:active { transform:scale(0.95); }
  .btn-approve { background:#2e7d32; color:#fff; }
  .btn-reject { background:#c62828; color:#fff; }
  button:disabled { cursor:not-allowed; opacity:0.6; }

  @media (max-width:600px){
    table, thead, tbody, th, td, tr { display:block; }
    thead { display:none; }
    tr { background:#fff; margin-bottom:12px; padding:15px; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
    td { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border:none; }
    td::before { content:attr(data-label); font-weight:bold; color:#555; }
    
    /* 簽核按鈕加大 50% */
    .btn-approve, .btn-reject {
      padding: 21px; 
      font-size: 1.1em;
    }

    /* 狀態按鈕 (Badge) 加大 50% */
    /* 簽核狀態徽章 (Badge) 優化 */
    .badge {
      display: inline-block;
      padding: 12px 20px;       /* 增加上下左右內距，大幅提升點擊面積 */
      font-size: 1em;           /* 維持 1em 讓字體保持清晰，避免過大 */
      border-radius: 20px;      /* 圓角加大更像按鈕 */
      min-width: 80px;          /* 設定最小寬度，確保無論字數多少都好按 */
      text-align: center;       /* 文字置中 */
      touch-action: manipulation; /* 提升手機觸控反應 */
    }
  }
</style>
</head>
<body>

<div id="loginBox">
  <h2>請假簽核系統</h2>
  <input id="loginCode" type="text" placeholder="請輸入代碼" autocomplete="off">
  <button onclick="login()">登入</button>
</div>

<div id="mainCard">
  <div class="header">
    <h3>請假簽核系統</h3>
    <button class="closeBtn-round" onclick="logout()">×</button>
  </div>
  <div class="filters">
    <button id="btnAll" onclick="setStatus('ALL')">全部</button>
    <button id="btnPending" onclick="setStatus('未簽核')">未簽核</button>
    <button id="btnProcessing" onclick="setStatus('簽核中')">簽核中</button>
    <button id="btnDone" onclick="setStatus('已簽核')">已簽核</button>
  </div>
  <table id="dataTable">
    <thead><tr><th>姓名</th><th>日期</th><th>假別</th><th>時間</th><th>時數</th><th>狀態</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="overlay"></div>
<div id="modal">
  <button class="modal-close" onclick="closeModal()">×</button>
  <h3>簽核確認</h3>
  <div class="modal-item"><div class="modal-label">姓名</div><div class="modal-val" id="modalName"></div></div>
  <div class="modal-item"><div class="modal-label">假別/日期</div><div class="modal-val" id="modalInfo"></div></div>
  <div class="modal-item"><div class="modal-label">事由</div><div class="modal-val" id="modalReason"></div></div>
  <div style="display:flex; gap:15px; margin-top:25px;">
    <button class="btn-action btn-approve" onclick="submit(true, this)">核准</button>
    <button class="btn-action btn-reject" onclick="submit(false, this)">不准</button>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyVOU1WCWNCVyTjW-kkHv7Yds0wOKopZnuxIzVgPxAj_5eDbWWCTloD2zdiJ1ATVA9u8w/exec';
let loginCode='', userRole='', approverName='', statusFilter='未簽核', allData=[];
let currentKey=null, currentLevel=null;

async function login(){
  const btn = document.querySelector('#loginBox button');
  const code = document.getElementById('loginCode').value.trim();
  if(!code) return;
  btn.textContent = '登入中...';
  btn.disabled = true;
  try {
    const res = await fetch(`${WEB_APP_URL}?action=checkLogin&code=${code}`).then(r=>r.json());
    if(!res) { alert('代碼無效'); btn.textContent = '登入'; btn.disabled = false; return; }
    loginCode = code; userRole = res.role; approverName = res.approverName;
    document.getElementById('loginBox').style.display='none';
    document.getElementById('mainCard').style.display='block';
    loadData();
  } catch(e) { alert('系統錯誤'); btn.textContent = '登入'; btn.disabled = false; }
}

function logout(){
  document.getElementById('mainCard').style.display = 'none';
  document.getElementById('loginBox').style.display = 'flex';
  document.getElementById('loginCode').value = '';
  const loginBtn = document.querySelector('#loginBox button');
  loginBtn.textContent = '登入'; loginBtn.disabled = false;
  loginCode = ''; userRole = ''; approverName = ''; allData = [];
}

function closeModal(){ document.getElementById('overlay').style.display = document.getElementById('modal').style.display = 'none'; }

async function loadData(){
  const res = await fetch(`${WEB_APP_URL}?action=getLeaveData&code=${loginCode}`).then(r=>r.json());
  allData = res.list;
  updateButtons(res.count);
  renderTable();
}

function updateButtons(c){
  document.getElementById('btnAll').textContent = `全部 (${c.ALL})`;
  document.getElementById('btnPending').textContent = `未簽核 (${c['未簽核']})`;
  document.getElementById('btnProcessing').textContent = `簽核中 (${c['簽核中']})`;
  document.getElementById('btnDone').textContent = `已簽核 (${c['已簽核']})`;
}

function setStatus(s){
  statusFilter = s;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('active', b.id === 'btn'+s.replace('ALL','All')));
  renderTable();
}

function renderTable(){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  allData.forEach(r=>{
    if(statusFilter !== 'ALL' && r.status !== statusFilter) return;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td data-label="姓名">${r.userName}</td><td data-label="日期">${r.applyDate}</td><td data-label="假別">${r.leaveType}</td><td data-label="時間">${r.startTime}~${r.endTime}</td><td data-label="時數">${r.hours}</td><td data-label="狀態"><span class="badge badge-${r.status}">${r.status}</span></td>`;
    if((userRole==='督導' && !r.approval1) || (userRole==='總督導' && r.approval1 && !r.approval2)){
      tr.onclick = () => openModal(r);
    }
    tbody.appendChild(tr);
  });
}

function openModal(r){
  document.getElementById('modalName').textContent = r.userName;
  document.getElementById('modalInfo').textContent = `${r.leaveType} / ${r.applyDate}`;
  document.getElementById('modalReason').textContent = r.reason || '無';
  document.getElementById('overlay').style.display = document.getElementById('modal').style.display = 'block';
  currentKey = r.keyId;
  currentLevel = (r.approval1 && userRole==='總督導') ? 2 : 1;
}

async function submit(ok, btn) {
  const container = btn.parentElement;
  const originalText = btn.innerText;
  btn.innerText = '簽核中...';
  container.querySelectorAll('button').forEach(b => b.disabled = true);
  try {
    const params = new URLSearchParams({action:'updateLeaveApproval', keyId:currentKey, level:currentLevel, approver:approverName, status:ok?'核准':'不准'});
    const res = await fetch(`${WEB_APP_URL}?${params.toString()}`).then(r=>r.json());
    alert(res.message || '簽核完成');
    closeModal();
    loadData();
  } catch (e) {
    alert('簽核失敗，請確認後端已開啟 CORS');
    btn.innerText = originalText;
    container.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}
</script>
</body>
</html>
